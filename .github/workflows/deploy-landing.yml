name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - landing/**
      - package.json
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/v0\.[0-9]*\.[0-9]*>/v${VERSION}>/" landing/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing
          publish_branch: gh-pages
          keep_files: false
